# Railway config for the Garmin recovery cron service.
# Deploy as a SEPARATE Railway service with Root Directory = garmin-sidecar.
# It builds the Python sidecar and runs the daily ingest, then exits.
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python ingest.py"
# Daily at 05:15 UTC (~07:15 Europe/Berlin) — after wake, last night's sleep
# finalized. The ingester backfills missed days, so an occasional skip is fine.
cronSchedule = "15 5 * * *"
# Cron jobs run once and exit; do not restart on exit-0.
restartPolicyType = "NEVER"
