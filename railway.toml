[build]
builder = "NIXPACKS"

[deploy]
startCommand = "bun run start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway injects DATABASE_URL when the Postgres plugin is attached to this service.
# PORT is set by Railway; src/config.ts reads it via process.env.PORT.
