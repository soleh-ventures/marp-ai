[build]
builder = "NIXPACKS"

[deploy]
# Run pending DB migrations before the new release goes live. Runs after
# build, inside Railway's network (internal DATABASE_URL resolves), and
# blocks the cutover if it fails — so a bad migration aborts the deploy
# instead of crashing the running app. Migrations must stay backward-
# compatible (expand/contract): additive first, so old + new code both
# work against the migrated schema during the brief overlap.
preDeployCommand = "bun run db:migrate"
startCommand = "bun run start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway injects DATABASE_URL when the Postgres plugin is attached to this service.
# PORT is set by Railway; src/config.ts reads it via process.env.PORT.
